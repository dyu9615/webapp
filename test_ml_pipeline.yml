name: Test ML Data Pipeline

# 允许你在 GitHub 网页端手动点击按钮触发运行
on:
  workflow_dispatch: 

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你的代码库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 3.11 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖包 (pandas 和 yfinance)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      # 4. 运行拉取数据的脚本
      - name: Run ML Dataset Script
        run: |
          python webapp/data_service/scripts/build_ml_dataset.py

      # 5. 将生成的 CSV 文件作为 Artifact 上传，供你下载
      - name: Upload Dataset Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-training-dataset
          path: webapp/data_service/storage/ml_data/ml_training_panel_test.csv
          # 如果路径下没有文件，工作流会报错提醒你
          if-no-files-found: error
